
<!DOCTYPE html>
<html>
<head>
<title>My Movie Site</title>

<style>
body {
  font-family: Arial;
  background: #f1f1f1;
  margin: 0;
}

.header {
  background: #111;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
}

.container {
  padding: 10px;
}

.card {
  background: white;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.card img {
  width: 100%;
  border-radius: 5px;
}

.title {
  font-size: 18px;
  font-weight: bold;
  margin-top: 5px;
}

.info {
  color: gray;
  margin: 5px 0;
}

.btn {
  display: block;
  text-align: center;
  background: #28a745;
  color: white;
  padding: 8px;
  text-decoration: none;
  border-radius: 5px;
}

.btn:hover {
  background: #218838;
}

.footer {
  text-align: center;
  padding: 10px;
  color: gray;
}
</style>

</head>

<body>

<div class="header">
  🎬 My Movie Site
</div>

<div class="container">

  <div class="card">
    <img src="https://via.placeholder.com/300x150">
    <div class="title">Movie 1</div>
    <div class="info">720p | 800MB</div>
    <a href="#" class="btn">Download</a>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/300x150">
    <div class="title">Movie 2</div>
    <div class="info">1080p | 1.2GB</div>
    <a href="#" class="btn">Download</a>
  </div>

</div>

<div class="footer">
  © 2026 My Site
</div>

</body>
</html>
