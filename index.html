<!DOCTYPE html>
<html>
<head>
  <title>Polash Site</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f1f1f1;
    }

    .header {
      background: #1877f2;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }

    .menu {
      padding: 10px;
    }

    .menu a {
      display: block;
      background: #ddd;
      padding: 12px;
      margin: 8px 0;
      text-decoration: none;
      color: black;
      border-radius: 8px;
    }

    .menu a:hover {
      background: #ccc;
    }

    .content {
      background: white;
      margin: 10px;
      padding: 15px;
      border-radius: 10px;
    }

    .footer {
      text-align: center;
      padding: 10px;
      background: #ddd;
      margin-top: 20px;
    }

    button {
      margin: 10px;
      padding: 10px;
      border: none;
      background: black;
      color: white;
      border-radius: 8px;
    }

    /* 🌙 Dark Mode */
    .dark {
      background: #121212;
      color: white;
    }

    .dark .header {
      background: black;
    }

    .dark .menu a {
      background: #333;
      color: white;
    }

    .dark .content {
      background: #1e1e1e;
    }

    .dark .footer {
      background: black;
    }

  </style>
</head>

<body>

<div class="header">
  🔥 Polash Wapka Site
</div>

<!-- 🌙 Dark Button -->
<button onclick="toggleDark()">🌙 Dark Mode</button>

<div class="menu">
  <a href="index.html">🏠 Home</a>
  <a href="movies.html">🎬 Movies</a>
  <a href="#">📱 Apps</a>
  <a href="#">🎵 Music</a>
  <a href="#">📥 Download</a>
</div>

<div class="content">
  <h3>Welcome 👋</h3>
  <p>এটা আমার Wapka style website 🚀</p>
</div>

<div class="footer">
  © 2026 design by polash
</div>

<script>
function toggleDark() {
  document.body.classList.toggle("dark");
}
</script>

</body>
</html>
</body>
</html>
