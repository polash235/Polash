<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Movie Site</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0d0d0d;
      color: #fff;
    }

    header {
      background: linear-gradient(45deg, #00bcd4, #0097a7);
      padding: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      padding: 10px;
    }

    .movie {
      background: #1a1a1a;
      border-radius: 10px;
      margin-bottom: 15px;
      overflow: hidden;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    .movie img {
      width: 100%;
      height: auto;
    }

    .movie-content {
      padding: 10px;
    }

    .movie h3 {
      margin: 5px 0;
    }

    .btn {
      display: inline-block;
      padding: 10px;
      background: #00bcd4;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      margin-top: 8px;
    }

    footer {
      text-align: center;
      padding: 10px;
      background: #000;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<header>🎬 My Movie Site</header>

<div class="container">

  <div class="movie">
    <img src="https://via.placeholder.com/300x400">
    <div class="movie-content">
      <h3>Movie 1</h3>
      <p>720p | 800MB</p>
      <a class="btn" href="movie1.html">Download</a>
    </div>
  </div>

  <div class="movie">
    <img src="https://via.placeholder.com/300x400">
    <div class="movie-content">
      <h3>Movie 2</h3>
      <p>1080p | 1.2GB</p>
      <a class="btn" href="#">Download</a>
    </div>
  </div>

</div>

<footer>© 2026 My Site</footer>

</body>
</html>
